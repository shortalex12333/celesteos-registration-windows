version: "3.8"

services:
  registration-api:
    build: .
    command: >
      python -m uvicorn services.registration:app
      --host 0.0.0.0 --port 8001 --log-level info
    ports:
      - "8001:8001"
    environment:
      # Master Supabase (auth + fleet registry)
      - MASTER_SUPABASE_URL=https://qvzmkaamzaqxpzbewjxe.supabase.co
      - MASTER_SUPABASE_SERVICE_KEY=${MASTER_SUPABASE_SERVICE_KEY}
      # Microsoft Graph API for email (optional — debug mode if not set)
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - AZURE_SENDER_EMAIL=${AZURE_SENDER_EMAIL:-noreply@celeste7.ai}
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8001/api/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
